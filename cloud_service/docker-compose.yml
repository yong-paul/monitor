version: '3.8'

services:
  cloud-service:
    build: .
    container_name: quant-cloud-service
    ports:
      - "5000:5000"
    restart: unless-stopped  # 自动重启（除非手动停止）
    environment:
      - TZ=Asia/Shanghai  # 设置时区
    volumes:
      - ./logs:/app/logs  # 如果需要日志挂载
    network_mode: bridge  # 使用桥接网络

