<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量化交易系统 - 监控面板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        .card-title { font-size: 1.3rem; font-weight: 600; color: #333; }
        .status-indicator { display: flex; align-items: center; gap: 8px; }
        .status-dot {
            width: 12px; height: 12px; border-radius: 50%;
            animation: pulse 2s infinite;
        }
        .status-dot.online { background-color: #10b981; }
        .status-dot.offline { background-color: #ef4444; animation: none; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .status-text { font-weight: 500; color: #666; }
        .metric-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .metric {
            background: #f8fafc; padding: 15px; border-radius: 10px;
            text-align: center;
        }
        .metric-value { font-size: 1.8rem; font-weight: 700; color: #667eea; margin-bottom: 5px; }
        .metric-label { font-size: 0.9rem; color: #666; }
        .stream-tabs {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px;
        }
        .stream-tab {
            padding: 8px 16px; background: #f8fafc; border-radius: 6px;
            cursor: pointer; border: 1px solid #e2e8f0; transition: all 0.2s;
        }
        .stream-tab:hover { background: #e8f0fe; border-color: #667eea; }
        .stream-tab.active { background: #667eea; color: white; border-color: #667eea; }
        .stream-tab-count { font-size: 0.8rem; opacity: 0.8; }
        .stream-content {
            border-top: 1px solid #e2e8f0; padding-top: 15px;
        }
        .stream-content-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px;
        }
        .message-list {
            max-height: 400px; overflow-y: auto; border: 1px solid #e2e8f0;
            border-radius: 8px;
        }
        .message-item {
            padding: 12px 15px; border-bottom: 1px solid #e2e8f0;
            background: #fafafa;
        }
        .message-item:nth-child(even) { background: #ffffff; }
        .message-item:last-child { border-bottom: none; }
        .message-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px;
        }
        .message-id { color: #999; font-size: 0.75rem; }
        .message-index { color: #667eea; font-weight: 600; font-size: 0.85rem; }
        .message-content {
            background: white; padding: 10px; border-radius: 6px; border: 1px solid #e2e8f0;
            word-break: break-all; font-family: monospace; font-size: 0.85rem;
        }
        .date-group {
            margin-bottom: 20px;
        }
        .date-group-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 10px 15px; border-radius: 6px 6px 0 0;
            font-weight: 600; position: sticky; top: 0; z-index: 10;
        }
        .action-buy { color: #10b981; font-weight: 600; }
        .action-sell { color: #ef4444; font-weight: 600; }
        .message-fields {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 8px;
        }
        .message-field {
            background: #f8fafc; padding: 6px 10px; border-radius: 4px; font-size: 0.85rem;
        }
        .message-field-label { color: #666; font-size: 0.75rem; }
        .message-field-value { font-weight: 500; }
        
        /* 左右分栏布局 */
        .split-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .column-buy {
            border-left: 4px solid #ef4444;
        }
        .column-sell {
            border-left: 4px solid #10b981;
        }
        .column-header {
            padding: 10px 15px;
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 10px;
            border-radius: 0 4px 4px 0;
        }
        .column-header.buy {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }
        .column-header.sell {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }
        .column-empty {
            text-align: center;
            color: #999;
            padding: 30px;
            font-size: 0.9rem;
        }
        
        /* 监控消息详情样式 */
        .monitor-history-item {
            padding: 12px 15px;
            border-bottom: 1px solid #e2e8f0;
            background: #fafafa;
        }
        .monitor-history-item:nth-child(even) {
            background: #ffffff;
        }
        .monitor-history-item:last-child {
            border-bottom: none;
        }
        .monitor-history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .monitor-history-time {
            font-weight: 600;
            color: #667eea;
        }
        .monitor-history-id {
            color: #999;
            font-size: 0.75rem;
        }
        .monitor-history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        .monitor-history-section {
            background: white;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
        }
        .monitor-history-section-title {
            font-weight: 600;
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 8px;
            padding-bottom: 5px;
            border-bottom: 1px solid #e2e8f0;
        }
        .monitor-history-field {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 0.85rem;
        }
        .monitor-history-field-label {
            color: #666;
        }
        .monitor-history-field-value {
            font-weight: 500;
        }
        .status-online {
            color: #10b981;
        }
        .status-offline {
            color: #ef4444;
        }
        .trade-table { width: 100%; border-collapse: collapse; }
        .trade-table th, .trade-table td {
            padding: 12px; text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }
        .trade-table th { background: #f8fafc; font-weight: 600; color: #333; }
        .trade-table tr:hover { background: #f8fafc; }
        .buy { color: #10b981; font-weight: 600; }
        .sell { color: #ef4444; font-weight: 600; }
        .last-update { text-align: right; color: #999; font-size: 0.85rem; margin-top: 10px; }
        .full-width { grid-column: 1 / -1; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>量化交易系统</h1>
            <p>实时监控面板</p>
        </div>

        <div class="dashboard">
            <!-- 第一行：Redis连接状态、本地服务状态、系统资源 -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Redis 连接状态</h2>
                    <div class="status-indicator">
                        <div class="status-dot" id="redis-status-dot"></div>
                        <span class="status-text" id="redis-status-text">检查中...</span>
                    </div>
                </div>
                <div class="metric-grid">
                    <div class="metric">
                        <div class="metric-value" id="stream-count">-</div>
                        <div class="metric-label">策略流数量</div>
                    </div>
                    <div class="metric">
                        <div class="metric-value" id="total-messages">-</div>
                        <div class="metric-label">总消息数</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">本地服务状态</h2>
                    <div class="status-indicator">
                        <div class="status-dot" id="local-monitor-dot"></div>
                        <span class="status-text" id="local-monitor-text">检查中...</span>
                    </div>
                </div>
                <div style="font-size: 0.9rem; line-height: 2;">
                    <div style="display: flex; justify-content: space-between;">
                        <span>心跳状态:</span>
                        <span id="heartbeat-status">检查中...</span>
                    </div>
                    <div style="display: flex; justify-content: space-between;">
                        <span>距上次心跳:</span>
                        <span id="heartbeat-time">-</span>
                    </div>
                    <div style="display: flex; justify-content: space-between;">
                        <span>本地 Redis:</span>
                        <span id="local-redis-status">检查中...</span>
                    </div>
                    <div style="display: flex; justify-content: space-between;">
                        <span>信号接收进程:</span>
                        <span id="signal-receiver-status">检查中...</span>
                    </div>
                    <div style="display: flex; justify-content: space-between;">
                        <span>MiniQMT:</span>
                        <span id="miniqmt-status">检查中...</span>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">系统资源</h2>
                </div>
                <div class="metric-grid">
                    <div class="metric">
                        <div class="metric-value" id="cpu-percent">-</div>
                        <div class="metric-label">CPU 使用率</div>
                    </div>
                    <div class="metric">
                        <div class="metric-value" id="memory-percent">-</div>
                        <div class="metric-label">内存使用率</div>
                    </div>
                    <div class="metric">
                        <div class="metric-value" id="disk-percent">-</div>
                        <div class="metric-label">磁盘使用率</div>
                    </div>
                </div>
            </div>

            <!-- 最近交易记录卡片 -->
            <div class="card full-width">
                <div class="card-header">
                    <h2 class="card-title">最近交易记录</h2>
                </div>
                <table class="trade-table">
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>策略</th>
                            <th>代码</th>
                            <th>操作</th>
                            <th>价格</th>
                            <th>数量</th>
                        </tr>
                    </thead>
                    <tbody id="trade-table-body">
                        <tr>
                            <td colspan="6" style="text-align: center; color: #999; padding: 30px;">暂无数据</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- 策略流列表卡片 -->
            <div class="card full-width">
                <div class="card-header">
                    <h2 class="card-title">策略流列表</h2>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="text" id="stream-search" placeholder="搜索策略名称..." 
                               style="padding: 6px 10px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 0.9rem;">
                    </div>
                </div>
                <div class="stream-tabs" id="stream-tabs">
                    <div style="color: #999; text-align: center; padding: 20px;">加载中...</div>
                </div>
                <div class="stream-content" id="stream-content" style="display: none;">
                    <div class="stream-content-header">
                        <span id="current-stream-name" style="font-weight: 600; color: #333;"></span>
                        <span id="current-stream-count" style="color: #666; font-size: 0.9rem;"></span>
                        <div style="display: flex; gap: 10px; align-items: center;">
                            <select id="date-filter" style="padding: 5px 10px; border: 1px solid #e2e8f0; border-radius: 4px; font-size: 0.9rem;">
                                <option value="">全部日期</option>
                            </select>
                            <button onclick="closeStreamContent()" style="padding: 5px 12px; border: 1px solid #e2e8f0; border-radius: 4px; background: white; cursor: pointer;">关闭</button>
                        </div>
                    </div>
                    <div class="message-list" id="message-list"></div>
                </div>
            </div>

            <!-- 监控消息详情卡片 -->
            <div class="card full-width">
                <div class="card-header">
                    <h2 class="card-title">监控消息详情</h2>
                </div>
                <div class="monitor-history-list" id="monitor-history-list" style="max-height: 300px; overflow-y: auto;">
                    <div style="color: #999; text-align: center; padding: 30px;">加载中...</div>
                </div>
            </div>
        </div>

        <div class="last-update" id="last-update"></div>
    </div>

    <script>
        let currentStreamsData = {};
        let activeStreamName = null;

        // 从消息中提取日期
        function extractDateFromMessage(msg) {
            if (msg.data && msg.data.time) {
                const timeStr = msg.data.time;
                const match = timeStr.match(/^(\d{4}-\d{2}-\d{2})/);
                if (match) {
                    return match[1];
                }
            }
            return '未知日期';
        }

        // 按日期分组消息
        function groupMessagesByDate(messages) {
            const groups = {};
            messages.forEach((msg, index) => {
                const date = extractDateFromMessage(msg);
                if (!groups[date]) {
                    groups[date] = [];
                }
                groups[date].push({ ...msg, originalIndex: index });
            });
            return groups;
        }

        // 渲染消息字段
        function renderMessageFields(msg) {
            let fieldsHtml = '';
            if (msg.data) {
                const fieldOrder = ['time', 'action', 'code', 'price', 'pct', 'strategy', 'cancel_order'];
                const orderedFields = [];
                const otherFields = [];
                
                Object.keys(msg.data).forEach(key => {
                    if (fieldOrder.includes(key)) {
                        orderedFields.push(key);
                    } else {
                        otherFields.push(key);
                    }
                });
                orderedFields.sort((a, b) => fieldOrder.indexOf(a) - fieldOrder.indexOf(b));
                
                [...orderedFields, ...otherFields].forEach(key => {
                    let value = msg.data[key];
                    let extraClass = '';
                    
                    if (key === 'action') {
                        extraClass = value === 'BUY' ? 'action-buy' : (value === 'SELL' ? 'action-sell' : '');
                    }
                    
                    fieldsHtml += `
                        <div class="message-field">
                            <div class="message-field-label">${key}</div>
                            <div class="message-field-value ${extraClass}">${value}</div>
                        </div>
                    `;
                });
            }
            return fieldsHtml;
        }

        // 渲染消息列表（按日期分组 + 买卖分栏）
        function renderMessageList(streamData, filterDate = '') {
            const messageList = document.getElementById('message-list');
            if (!streamData.messages || streamData.messages.length === 0) {
                messageList.innerHTML = '<div style="padding: 30px; text-align: center; color: #999;">暂无消息</div>';
                return;
            }

            const groups = groupMessagesByDate(streamData.messages);
            const dates = Object.keys(groups).sort().reverse();
            
            // 更新日期筛选下拉框
            const dateFilter = document.getElementById('date-filter');
            const currentValue = dateFilter.value;
            dateFilter.innerHTML = '<option value="">全部日期</option>';
            dates.forEach(date => {
                const option = document.createElement('option');
                option.value = date;
                option.textContent = `${date} (${groups[date].length}条)`;
                dateFilter.appendChild(option);
            });
            dateFilter.value = currentValue;
            
            // 根据筛选日期过滤
            const filteredDates = filterDate ? [filterDate] : dates;
            if (filteredDates.length === 0 || (filteredDates.length === 1 && !groups[filteredDates[0]])) {
                messageList.innerHTML = '<div style="padding: 30px; text-align: center; color: #999;">该日期无消息</div>';
                return;
            }

            let html = '';
            filteredDates.forEach(date => {
                const msgs = groups[date];
                
                // 按买卖类型分类
                const buyMsgs = msgs.filter(m => m.data && m.data.action === 'BUY');
                const sellMsgs = msgs.filter(m => m.data && m.data.action === 'SELL');
                const otherMsgs = msgs.filter(m => !m.data || !['BUY', 'SELL'].includes(m.data.action));
                
                html += `
                    <div class="date-group">
                        <div class="date-group-header">${date} (${msgs.length}条消息)</div>
                        <div class="split-columns">
                            <div class="column-buy">
                                <div class="column-header buy">买入 (${buyMsgs.length}条)</div>
                                ${buyMsgs.length > 0 ? buyMsgs.map(msg => `
                                    <div class="message-item">
                                        <div class="message-header">
                                            <span class="message-index">#${msg.originalIndex + 1}</span>
                                            <span class="message-id">ID: ${msg.id}</span>
                                        </div>
                                        <div class="message-fields">
                                            ${renderMessageFields(msg)}
                                        </div>
                                    </div>
                                `).join('') : '<div class="column-empty">暂无买入</div>'}
                            </div>
                            <div class="column-sell">
                                <div class="column-header sell">卖出 (${sellMsgs.length}条)</div>
                                ${sellMsgs.length > 0 ? sellMsgs.map(msg => `
                                    <div class="message-item">
                                        <div class="message-header">
                                            <span class="message-index">#${msg.originalIndex + 1}</span>
                                            <span class="message-id">ID: ${msg.id}</span>
                                        </div>
                                        <div class="message-fields">
                                            ${renderMessageFields(msg)}
                                        </div>
                                    </div>
                                `).join('') : '<div class="column-empty">暂无卖出</div>'}
                            </div>
                        </div>
                `;
                
                // 显示其他类型消息
                if (otherMsgs.length > 0) {
                    html += `<div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #e2e8f0;">
                        <div style="font-weight: 600; color: #666; margin-bottom: 10px;">其他消息 (${otherMsgs.length}条)</div>`;
                    otherMsgs.forEach(msg => {
                        html += `
                            <div class="message-item">
                                <div class="message-header">
                                    <span class="message-index">#${msg.originalIndex + 1}</span>
                                    <span class="message-id">ID: ${msg.id}</span>
                                </div>
                                <div class="message-fields">
                                    ${renderMessageFields(msg)}
                                </div>
                            </div>
                        `;
                    });
                    html += '</div>';
                }
                
                html += '</div>';
            });
            
            messageList.innerHTML = html;
        }

        // 选择策略流
        function selectStream(streamName) {
            activeStreamName = streamName;
            const streamData = currentStreamsData[streamName];
            
            if (!streamData) return;
            
            // 更新标签页状态
            document.querySelectorAll('.stream-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.stream === streamName);
            });
            
            // 显示消息内容
            document.getElementById('stream-content').style.display = 'block';
            document.getElementById('current-stream-name').textContent = streamName;
            document.getElementById('current-stream-count').textContent = `(${streamData.length} 条消息)`;
            
            // 渲染消息列表（保持当前日期筛选）
            const dateFilter = document.getElementById('date-filter');
            renderMessageList(streamData, dateFilter.value);
        }

        // 关闭策略流内容
        function closeStreamContent() {
            document.getElementById('stream-content').style.display = 'none';
            document.querySelectorAll('.stream-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            activeStreamName = null;
        }

        // 过滤策略流
        function filterStreams(searchTerm) {
            const searchLower = searchTerm.toLowerCase();
            document.querySelectorAll('.stream-tab').forEach(tab => {
                const streamName = tab.dataset.stream.toLowerCase();
                if (streamName.includes(searchLower)) {
                    tab.style.display = 'inline-block';
                } else {
                    tab.style.display = 'none';
                }
            });
        }

        // 渲染单个字段
        function renderMonitorField(label, value, highlightClass = '') {
            let displayValue = value;
            if (typeof value === 'boolean') {
                displayValue = value ? '是' : '否';
            }
            return `
                <div class="monitor-history-field">
                    <span class="monitor-history-field-label">${label}</span>
                    <span class="monitor-history-field-value ${highlightClass}">${displayValue}</span>
                </div>
            `;
        }

        // 更新监控历史消息
        async function updateMonitorHistory() {
            try {
                const response = await fetch('/api/monitor-history');
                const messages = await response.json();
                const container = document.getElementById('monitor-history-list');
                
                if (messages.length === 0) {
                    container.innerHTML = '<div style="color: #999; text-align: center; padding: 30px;">暂无监控消息</div>';
                    return;
                }
                
                container.innerHTML = messages.map((msg, index) => {
                    const data = msg.data;
                    let sectionsHtml = '';
                    
                    // Redis 连接状态
                    if (data.redis_local || data.redis_cloud) {
                        sectionsHtml += '<div class="monitor-history-section">';
                        sectionsHtml += '<div class="monitor-history-section-title">Redis 连接</div>';
                        if (data.redis_local) {
                            const localClass = data.redis_local.connected ? 'status-online' : 'status-offline';
                            sectionsHtml += renderMonitorField('本地', data.redis_local.connected ? '在线' : '离线', localClass);
                        }
                        if (data.redis_cloud) {
                            const cloudClass = data.redis_cloud.connected ? 'status-online' : 'status-offline';
                            sectionsHtml += renderMonitorField('云端', data.redis_cloud.connected ? '在线' : '离线', cloudClass);
                        }
                        sectionsHtml += '</div>';
                    }
                    
                    // 进程状态
                    if (data.signal_receiver || data.miniqmt) {
                        sectionsHtml += '<div class="monitor-history-section">';
                        sectionsHtml += '<div class="monitor-history-section-title">进程状态</div>';
                        if (data.signal_receiver) {
                            const recvClass = data.signal_receiver.running ? 'status-online' : 'status-offline';
                            sectionsHtml += renderMonitorField('信号接收', data.signal_receiver.running ? '运行中' : '未运行', recvClass);
                        }
                        if (data.miniqmt) {
                            const miniClass = data.miniqmt.running ? 'status-online' : 'status-offline';
                            sectionsHtml += renderMonitorField('MiniQMT', data.miniqmt.running ? '运行中' : '未运行', miniClass);
                        }
                        sectionsHtml += '</div>';
                    }
                    
                    // 系统资源
                    if (data.system) {
                        sectionsHtml += '<div class="monitor-history-section">';
                        sectionsHtml += '<div class="monitor-history-section-title">系统资源</div>';
                        if (data.system.cpu_percent !== undefined) {
                            sectionsHtml += renderMonitorField('CPU', data.system.cpu_percent + '%');
                        }
                        if (data.system.memory_percent !== undefined) {
                            sectionsHtml += renderMonitorField('内存', data.system.memory_percent + '%');
                        }
                        if (data.system.disk_percent !== undefined) {
                            sectionsHtml += renderMonitorField('磁盘', data.system.disk_percent + '%');
                        }
                        sectionsHtml += '</div>';
                    }
                    
                    return `
                        <div class="monitor-history-item">
                            <div class="monitor-history-header">
                                <span class="monitor-history-time">${msg.timestamp || data.timestamp || '未知时间'}</span>
                                <span class="monitor-history-id">#${index + 1} ID: ${msg.id}</span>
                            </div>
                            <div class="monitor-history-grid">
                                ${sectionsHtml}
                            </div>
                        </div>
                    `;
                }).join('');
                
            } catch (error) {
                console.error('获取监控历史失败:', error);
                document.getElementById('monitor-history-list').innerHTML = '<div style="color: #999; text-align: center; padding: 30px;">获取失败</div>';
            }
        }

        // 更新Redis状态和策略流信息
        async function updateStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                currentStreamsData = data.streams;
                
                // 更新Redis连接状态
                const statusDot = document.getElementById('redis-status-dot');
                const statusText = document.getElementById('redis-status-text');
                if (data.redis_connected) {
                    statusDot.className = 'status-dot online';
                    statusText.textContent = '在线';
                } else {
                    statusDot.className = 'status-dot offline';
                    statusText.textContent = '离线';
                }

                // 更新策略流数量和总消息数
                const streamCount = Object.keys(data.streams).length;
                document.getElementById('stream-count').textContent = streamCount;
                
                let totalMessages = 0;
                for (const stream in data.streams) {
                    totalMessages += data.streams[stream].length || 0;
                }
                document.getElementById('total-messages').textContent = totalMessages;

                // 更新策略流标签页
                const streamTabs = document.getElementById('stream-tabs');
                if (streamCount === 0) {
                    streamTabs.innerHTML = '<div style="color: #999; text-align: center; padding: 20px;">暂无策略流</div>';
                    closeStreamContent();
                } else {
                    streamTabs.innerHTML = '';
                    for (const streamName in data.streams) {
                        const streamData = data.streams[streamName];
                        const tab = document.createElement('div');
                        tab.className = 'stream-tab' + (activeStreamName === streamName ? ' active' : '');
                        tab.dataset.stream = streamName;
                        tab.onclick = () => selectStream(streamName);
                        tab.innerHTML = `
                            ${streamName} <span class="stream-tab-count">(${streamData.length})</span>
                        `;
                        streamTabs.appendChild(tab);
                    }
                    
                    // 如果之前有激活的流，保持它
                    if (activeStreamName && data.streams[activeStreamName]) {
                        const dateFilter = document.getElementById('date-filter');
                        const currentDateValue = dateFilter.value;
                        selectStream(activeStreamName);
                        // 保持日期筛选
                        if (currentDateValue) {
                            dateFilter.value = currentDateValue;
                            renderMessageList(data.streams[activeStreamName], currentDateValue);
                        }
                    }
                    
                    // 应用当前搜索过滤
                    const searchInput = document.getElementById('stream-search');
                    if (searchInput) {
                        filterStreams(searchInput.value);
                    }
                }

                // 更新最后更新时间
                document.getElementById('last-update').textContent = '最后更新: ' + data.last_update;
            } catch (error) {
                console.error('获取状态失败:', error);
                document.getElementById('redis-status-dot').className = 'status-dot offline';
                document.getElementById('redis-status-text').textContent = '连接失败';
            }
        }

        // 更新交易记录
        async function updateTrades() {
            try {
                const response = await fetch('/api/trades');
                const trades = await response.json();
                
                const tbody = document.getElementById('trade-table-body');
                if (trades.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #999; padding: 30px;">暂无交易记录</td></tr>';
                } else {
                    tbody.innerHTML = '';
                    for (const trade of trades) {
                        const tr = document.createElement('tr');
                        const actionClass = trade.action === 'BUY' ? 'buy' : 'sell';
                        tr.innerHTML = `
                            <td>${trade.time}</td>
                            <td>${trade.strategy}</td>
                            <td>${trade.code}</td>
                            <td class="${actionClass}">${trade.action}</td>
                            <td>${trade.price.toFixed(2)}</td>
                            <td>${trade.volume}</td>
                        `;
                        tbody.appendChild(tr);
                    }
                }
            } catch (error) {
                console.error('获取交易记录失败:', error);
            }
        }

        // 更新本地监控服务状态
        async function updateLocalMonitor() {
            try {
                const response = await fetch('/api/monitor');
                const data = await response.json();
                
                // 处理错误情况
                if (data.error) {
                    document.getElementById('local-monitor-dot').className = 'status-dot offline';
                    document.getElementById('local-monitor-text').textContent = '连接失败';
                    document.getElementById('heartbeat-status').textContent = '异常';
                    document.getElementById('heartbeat-status').style.color = '#ef4444';
                    return;
                }
                
                // 处理无数据情况
                if (data.message === '暂无监控数据') {
                    document.getElementById('local-monitor-dot').className = 'status-dot offline';
                    document.getElementById('local-monitor-text').textContent = '无数据';
                    document.getElementById('heartbeat-status').textContent = '无数据';
                    document.getElementById('heartbeat-status').style.color = '#666';
                    document.getElementById('heartbeat-time').textContent = '-';
                    return;
                }
                
                // 解析心跳状态
                const heartbeatStatus = data.heartbeat_status || {};
                const isTimeout = heartbeatStatus.timeout || false;
                const timeSinceHeartbeat = heartbeatStatus.time_since_heartbeat || 0;
                
                // 更新本地服务在线状态
                if (isTimeout) {
                    document.getElementById('local-monitor-dot').className = 'status-dot offline';
                    document.getElementById('local-monitor-text').textContent = '心跳超时';
                    document.getElementById('heartbeat-status').textContent = '超时';
                    document.getElementById('heartbeat-status').style.color = '#ef4444';
                } else {
                    document.getElementById('local-monitor-dot').className = 'status-dot online';
                    document.getElementById('local-monitor-text').textContent = '在线';
                    document.getElementById('heartbeat-status').textContent = '正常';
                    document.getElementById('heartbeat-status').style.color = '#10b981';
                }
                
                // 更新心跳时间
                document.getElementById('heartbeat-time').textContent = timeSinceHeartbeat + ' 秒前';
                
                // 更新本地Redis状态
                const localRedisStatus = data.redis_local || {};
                const localRedisText = localRedisStatus.connected ? '在线' : '离线';
                const localRedisColor = localRedisStatus.connected ? '#10b981' : '#ef4444';
                document.getElementById('local-redis-status').textContent = localRedisText;
                document.getElementById('local-redis-status').style.color = localRedisColor;
                
                // 更新信号接收进程状态
                const signalReceiver = data.signal_receiver || {};
                const signalText = signalReceiver.running ? '运行中' : '未运行';
                const signalColor = signalReceiver.running ? '#10b981' : '#ef4444';
                document.getElementById('signal-receiver-status').textContent = signalText;
                document.getElementById('signal-receiver-status').style.color = signalColor;
                
                // 更新MiniQMT状态
                const miniqmt = data.miniqmt || {};
                const miniqmtText = miniqmt.running ? '运行中' : '未运行';
                const miniqmtColor = miniqmt.running ? '#10b981' : '#ef4444';
                document.getElementById('miniqmt-status').textContent = miniqmtText;
                document.getElementById('miniqmt-status').style.color = miniqmtColor;
                
                // 更新系统资源信息
                const system = data.system || {};
                document.getElementById('cpu-percent').textContent = (system.cpu_percent || 0) + '%';
                document.getElementById('memory-percent').textContent = (system.memory_percent || 0) + '%';
                document.getElementById('disk-percent').textContent = (system.disk_percent || 0) + '%';
                
            } catch (error) {
                console.error('获取本地监控数据失败:', error);
                document.getElementById('local-monitor-dot').className = 'status-dot offline';
                document.getElementById('local-monitor-text').textContent = '获取失败';
                document.getElementById('heartbeat-status').textContent = '异常';
                document.getElementById('heartbeat-status').style.color = '#ef4444';
            }
        }

        // 初始化加载数据
        updateStatus();
        updateTrades();
        updateLocalMonitor();
        updateMonitorHistory();
        
        // 搜索框事件监听
        document.getElementById('stream-search').addEventListener('input', (e) => {
            filterStreams(e.target.value);
        });
        
        // 日期筛选事件监听
        document.getElementById('date-filter').addEventListener('change', (e) => {
            if (activeStreamName && currentStreamsData[activeStreamName]) {
                renderMessageList(currentStreamsData[activeStreamName], e.target.value);
            }
        });

        // 设置定时刷新
        setInterval(updateStatus, 3000);       // Redis状态每3秒刷新
        setInterval(updateTrades, 5000);       // 交易记录每5秒刷新
        setInterval(updateLocalMonitor, 5000); // 本地监控每5秒刷新
        setInterval(updateMonitorHistory, 10000); // 监控历史每10秒刷新
    </script>
</body>
</html>
