version: '3.8'

services:
  cloud-service:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: quant-cloud-service
    ports:
      - "5000:5000"
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - FLASK_ENV=production
    volumes:
      - ./logs:/app/logs
    network_mode: bridge
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
